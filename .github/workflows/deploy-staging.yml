name: Deploy Frontend to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  NODE_VERSION: '18'

jobs:
  deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Get EC2 Instance Details
      id: get-instance
      run: |
        # Get the instance created by backend terraform
        INSTANCE_ID=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=staging-crosslake-backend-instance" \
                    "Name=instance-state-name,Values=running" \
          --query 'Reservations[0].Instances[0].InstanceId' \
          --output text)
        
        if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
          echo "❌ No running EC2 instance found with tag Name=staging-crosslake-backend-instance"
          exit 1
        fi
        
        INSTANCE_IP=$(aws ec2 describe-instances \
          --instance-ids $INSTANCE_ID \
          --query 'Reservations[0].Instances[0].PublicIpAddress' \
          --output text)
        
        echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
        echo "instance_ip=$INSTANCE_IP" >> $GITHUB_OUTPUT
        echo "api_url=http://$INSTANCE_IP" >> $GITHUB_OUTPUT
        
        echo "✅ Found instance: $INSTANCE_ID with IP: $INSTANCE_IP"
    
    - name: Install Dependencies
      run: |
        echo "📦 Installing dependencies..."
        npm ci
    
    - name: Run Tests
      run: |
        echo "🧪 Running tests..."
        npm test -- --passWithNoTests || true
    
    - name: Build Frontend
      env:
        VITE_API_URL: ${{ steps.get-instance.outputs.api_url }}
      run: |
        echo "🔨 Building frontend with API URL: $VITE_API_URL"
        npm run build
        
        # Create deployment info file
        echo "{
          \"buildTime\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
          \"commitSha\": \"${{ github.sha }}\",
          \"branch\": \"${{ github.ref_name }}\",
          \"apiUrl\": \"$VITE_API_URL\"
        }" > dist/build-info.json
    
    - name: Create Deployment Package
      run: |
        echo "📦 Creating deployment package..."
        tar -czf frontend-dist.tar.gz -C dist .
        echo "Package size: $(du -h frontend-dist.tar.gz | cut -f1)"
    
    - name: Upload to S3
      id: upload
      run: |
        TIMESTAMP=$(date +%Y%m%d%H%M%S)
        S3_KEY="frontend-deployments/staging/frontend-${TIMESTAMP}-${GITHUB_SHA:0:7}.tar.gz"
        
        echo "📤 Uploading to S3..."
        aws s3 cp frontend-dist.tar.gz s3://crosslake-backend-pii-data-staging/$S3_KEY
        
        echo "s3_key=$S3_KEY" >> $GITHUB_OUTPUT
        echo "✅ Uploaded to s3://crosslake-backend-pii-data-staging/$S3_KEY"
    
    - name: Deploy to EC2
      run: |
        echo "🚀 Deploying to EC2..."
        
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids ${{ steps.get-instance.outputs.instance_id }} \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "#!/bin/bash",
            "set -e",
            
            "echo \"=== Starting Frontend Deployment ===\"",
            "echo \"Deployment Time: $(date)\"",
            "echo \"S3 Key: ${{ steps.upload.outputs.s3_key }}\"",
            
            "# Download from S3",
            "cd /tmp",
            "rm -f frontend-dist.tar.gz",
            "aws s3 cp s3://crosslake-backend-pii-data-staging/${{ steps.upload.outputs.s3_key }} frontend-dist.tar.gz",
            
            "# Backup current deployment",
            "if [ -d /var/www/crosslake-frontend ]; then",
            "  sudo tar -czf /tmp/frontend-backup-$(date +%Y%m%d%H%M%S).tar.gz -C /var/www/crosslake-frontend .",
            "fi",
            
            "# Deploy new version",
            "sudo mkdir -p /var/www/crosslake-frontend",
            "sudo rm -rf /var/www/crosslake-frontend/*",
            "sudo tar -xzf frontend-dist.tar.gz -C /var/www/crosslake-frontend/",
            "sudo chown -R nginx:nginx /var/www/crosslake-frontend",
            
            "# Verify deployment",
            "if [ -f /var/www/crosslake-frontend/index.html ]; then",
            "  echo \"✅ Frontend files deployed successfully\"",
            "else",
            "  echo \"❌ Frontend deployment failed - index.html not found\"",
            "  exit 1",
            "fi",
            
            "# Clean up",
            "rm -f frontend-dist.tar.gz",
            
            "# Restart nginx to ensure clean state",
            "sudo nginx -t && sudo systemctl reload nginx",
            
            "echo \"=== Frontend Deployment Complete ===\"",
            "echo \"URL: http://${{ steps.get-instance.outputs.instance_ip }}\"",
            
            "# Final check",
            "sleep 2",
            "curl -s -o /dev/null -w \"HTTP Status: %{http_code}\\n\" http://localhost || true"
          ]' \
          --query 'Command.CommandId' \
          --output text)
        
        echo "SSM Command ID: $COMMAND_ID"
        
        # Wait for deployment
        echo "⏳ Waiting for deployment to complete..."
        aws ssm wait command-executed \
          --command-id $COMMAND_ID \
          --instance-id ${{ steps.get-instance.outputs.instance_id }} || true
        
        # Get deployment results
        COMMAND_STATUS=$(aws ssm get-command-invocation \
          --command-id $COMMAND_ID \
          --instance-id ${{ steps.get-instance.outputs.instance_id }} \
          --query 'Status' \
          --output text)
        
        echo "Deployment Status: $COMMAND_STATUS"
        
        if [ "$COMMAND_STATUS" != "Success" ]; then
          echo "❌ Deployment failed!"
          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id ${{ steps.get-instance.outputs.instance_id }} \
            --query 'StandardErrorContent' \
            --output text
          exit 1
        fi
    
    - name: Verify Deployment
      run: |
        echo "🔍 Verifying deployment..."
        FRONTEND_URL="http://${{ steps.get-instance.outputs.instance_ip }}"
        
        # Check if frontend is accessible
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $FRONTEND_URL)
        
        if [ "$HTTP_STATUS" = "200" ]; then
          echo "✅ Frontend is accessible (HTTP $HTTP_STATUS)"
          
          # Verify it's our React app
          if curl -s $FRONTEND_URL | grep -q "Practitioner Seeker"; then
            echo "✅ React app verified!"
          else
            echo "⚠️  Page is accessible but might not be our React app"
          fi
          
          # Check build info
          if curl -s $FRONTEND_URL/build-info.json | grep -q "${{ github.sha }}"; then
            echo "✅ Correct version deployed!"
          fi
        else
          echo "❌ Frontend returned HTTP $HTTP_STATUS"
          exit 1
        fi
        
        # Check backend connectivity
        API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $FRONTEND_URL/api/v1/health)
        
        if [ "$API_STATUS" = "200" ]; then
          echo "✅ Backend API is accessible through frontend proxy"
        else
          echo "⚠️  Backend API returned HTTP $API_STATUS"
        fi
    
    - name: Clean up S3
      if: always()
      run: |
        # Keep last 5 deployments, delete older ones
        echo "🧹 Cleaning up old deployments..."
        
        aws s3api list-objects-v2 \
          --bucket crosslake-backend-pii-data-staging \
          --prefix frontend-deployments/staging/ \
          --query 'reverse(sort_by(Contents, &LastModified))[5:].Key' \
          --output text | \
        tr '\t' '\n' | \
        while read key; do
          if [ ! -z "$key" ]; then
            echo "Deleting old deployment: $key"
            aws s3 rm s3://crosslake-backend-pii-data-staging/$key
          fi
        done || true
    
    - name: Post Deployment Summary
      if: always()
      run: |
        echo "======================================"
        echo "📊 Deployment Summary"
        echo "======================================"
        echo "Frontend URL: http://${{ steps.get-instance.outputs.instance_ip }}"
        echo "API URL: http://${{ steps.get-instance.outputs.instance_ip }}/api/v1/health"
        echo "Build Time: $(date)"
        echo "Commit: ${{ github.sha }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "======================================="